<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sage_edain — faction explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="title">
            <strong id="faction-name">sage_edain</strong>
            <span id="faction-side" class="muted"></span>
        </div>
        <div class="controls">
            <select id="faction-select" title="Choose a faction" hidden></select>
            <button id="back" title="Back" disabled>&larr;</button>
            <input id="search" type="search" placeholder="Filter&hellip;" autocomplete="off">
            <label class="file-button">
                Load graph.json
                <input id="file" type="file" accept="application/json,.json" hidden>
            </label>
        </div>
    </header>
    <main>
        <nav id="sidebar"></nav>
        <section id="detail">
            <p class="empty">Loading&hellip; if nothing appears, use <em>Load graph.json</em> (produced by
                <code>sage-edain explore &lt;dir&gt; &lt;faction&gt; --json</code>).</p>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
